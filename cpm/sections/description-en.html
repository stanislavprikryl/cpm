<h2 id="desc" class="list">Common Provenance Model (CPM) Ontology: Description <span class="backlink"> back to <a href="#toc">ToC</a></span></h2>

<span class="markdown">The normative OWL 2 ontology representing the Common Provenance Model (CPM). It is designed to support the traceability of samples and data in multi-organizational environments, as defined by the Common Provenance Framework (CPF).</span>
